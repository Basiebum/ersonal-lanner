<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access — wigbo</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0c;
  --surface: #111116;
  --border: #1e1e28;
  --text: #e8e8f0;
  --muted: #52526e;
  --accent: #e8c840;
  --mono: 'IBM Plex Mono', monospace;
  --display: 'Bebas Neue', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: crosshair;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}
.card {
  width: 360px;
  border: 1px solid var(--border);
  padding: 40px;
  position: relative;
  animation: fadeUp .5s ease forwards;
}
.card::before {
  content: 'RESTRICTED ACCESS';
  position: absolute;
  top: -10px; left: 20px;
  font-size: .58rem;
  letter-spacing: .18em;
  color: var(--muted);
  background: var(--bg);
  padding: 0 8px;
}
.card::after {
  content: '';
  position: absolute;
  bottom: -1px; right: 40px;
  width: 30px; height: 1px;
  background: var(--accent);
}
.card-title {
  font-family: var(--display);
  font-size: 2.8rem;
  letter-spacing: .06em;
  margin-bottom: 4px;
}
.card-title span { color: var(--accent); }
.card-sub {
  font-size: .65rem;
  letter-spacing: .12em;
  color: var(--muted);
  margin-bottom: 36px;
  text-transform: uppercase;
}
label {
  display: block;
  font-size: .62rem;
  letter-spacing: .14em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
  margin-top: 20px;
}
input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: .82rem;
  padding: 12px 14px;
  outline: none;
  transition: border-color .2s;
}
input:focus { border-color: var(--accent); }
.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 28px;
}
button {
  flex: 1;
  padding: 12px;
  font-family: var(--mono);
  font-size: .68rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  transition: background .2s, color .2s;
}
.btn-primary {
  background: var(--accent);
  color: #0a0a0c;
  font-weight: 600;
}
.btn-primary:hover { background: #f0d040; }
.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.error {
  font-size: .68rem;
  color: #ff5555;
  letter-spacing: .06em;
  margin-top: 14px;
  display: none;
}
.back {
  display: block;
  text-align: center;
  margin-top: 24px;
  font-size: .62rem;
  letter-spacing: .1em;
  color: var(--muted);
  text-decoration: none;
  text-transform: uppercase;
  transition: color .2s;
}
.back:hover { color: var(--text); }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="card">
  <div class="card-title">wig<span>bo</span></div>
  <div class="card-sub">Personal planner — authorised access only</div>

  <label for="email">Email</label>
  <input id="email" type="email" autocomplete="username" placeholder="you@email.com">

  <label for="password">Password</label>
  <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">

  <div class="error" id="error-msg"></div>

  <div class="btn-row">
    <button class="btn-secondary" id="register-btn">Register</button>
    <button class="btn-primary" id="login-btn">Enter →</button>
  </div>

  <a href="/" class="back">← Back to site</a>
</div>

<script>
async function apiCall(path, body) {
  const res = await fetch(path, {
    method: 'POST',
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const j = await res.json().catch(() => ({ error: 'invalid response' }));
  return { ok: res.ok, json: j };
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showError('Email and password required.'); return; }
  const { ok, json } = await apiCall('/api/login', { email, password });
  if (!ok) { showError(json.error || 'Login failed.'); return; }
  window.location = '/planner';
});

document.getElementById('register-btn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showError('Email and password required.'); return; }
  const { ok, json } = await apiCall('/api/register', { email, password });
  if (!ok) { showError(json.error || 'Registration failed.'); return; }
  window.location = '/planner';
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});
</script>
</body>
</html>
